name: Sync stroke data

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    if: github.actor == 'Aerbote88'
    steps:
      - name: Checkout Nomflow
        uses: actions/checkout@v4

      - name: Checkout make-me-a-chunom
        uses: actions/checkout@v4
        with:
          repository: Aerbote88/make-me-a-chunom
          path: make-me-a-chunom

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run ingestion
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STROKE_DATA_SOURCE: ${{ github.workspace }}/make-me-a-chunom/public/stroke-data
        run: python -m backend.scripts.ingest_stroke_data
